name: Green Apple Backend CI/CD

on:
  push:
    branches: [development]

jobs:
  checkdir:
    runs-on: self-hosted
    steps:
      - name: Full Checkout
        run: cd /root/green-apple-backend && git stash && git pull origin development

      - name: Install Dependencies
        run: cd /root/green-apple-backend && npm install && npm run build && npm run format && sudo pm2 list &&  sudo pm2 restart 0
