name: Green Apple Backend CI/CD

on:
  pull_request:
    branches: [development]

jobs:
  checkdir:
    runs-on: self-hosted
    steps:
      - name: Full Checkout
        run: cd /root/green-apple-backend && git pull origin development

      - name: Install Dependencies
        run: cd /root/green-apple-backend && npm install

      - name: Making Build Directory
        run: cd /root/green-apple-backend && npm run build

      - name: Restarting PM2
        run: cd /root/green-apple-backend && pm2 restart all
